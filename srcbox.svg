<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/> <!-- Blue-500 -->
      <stop offset="100%" stop-color="#7c3aed"/> <!-- Violet-600 -->
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Shape: Rounded Squircle -->
  <!-- Margin 5% = 25.6px approx. Let's use 26px -->
  <!-- Rect 460x460 centered -->
  <rect x="26" y="26" width="460" height="460" rx="92" ry="92" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- Play Triangle -->
  <!-- Centered at 256, 256 -->
  <!-- Size approx 40% of 512 = 200px side -->
  <!-- Points: (196, 156), (196, 356), (376, 256) -->
  <!-- Slightly offset right for optical balance -->
  <path d="M196 156 L196 356 L376 256 Z" fill="white"/>
</svg>
